# --- c2-engine hop: merge into the STINGAR server's fluent.conf ----------
# Raw cowrie session events -> the engine. MUST precede the stock ES match.
# Sensor checkins and other tags are untouched — they keep their stock path.
<match stingar.events.cowrie>
  @type forward
  <server>
    host c2engine
    port 24230
  </server>
  <buffer>
    @type file
    path /fluentd/buffer/c2engine
    flush_interval 5s
    retry_max_interval 5m
    retry_forever true
    # Engine down => buffer & retry: events delay, never drop (DESIGN §8).
  </buffer>
</match>

# Enriched sessions -> the SAME stingar-* index/output the stock config
# uses for events today (copy the stock <match>'s ES settings here).
<match enriched.events.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix stingar
</match>

# The C2 evidence ledger -> stingar-c2-* (template es/templates/ must be
# installed before first write — geo_point won't dynamic-map).
<match enriched.c2.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix stingar-c2
</match>
