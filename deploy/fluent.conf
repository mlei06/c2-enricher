#<system>
#  log_level debug
#  log_format json
#</system>

<source>
  @type forward
  <transport tls>
    insecure true
  </transport>
  <security>
    self_hostname efk.local
    shared_key "#{ENV['FLUENTD_KEY']}"
  </security>
  port "#{ENV['FLUENTD_PORT']}"
  bind 0.0.0.0
</source>

<source>
  @type forward
  self_hostname efk.local
  port "#{ENV['FLUENTD_LOCAL_PORT']}"
  bind 0.0.0.0
</source>

# --- Stock path: all legacy sensors (stingar.events.*) unchanged ----------------

<filter stingar.events.*>
  @type geoip
  geoip_lookup_keys src_ip
  <record>
    geo_cc      ${country.iso_code["src_ip"]}
    geo_city    ${city.names.en["src_ip"]}
    geo_Loc  '{ "lat": ${location.latitude["src_ip"]}, "lon": ${location.longitude["src_ip"]} }'
  </record>
  skip_adding_null_record true
</filter>

<filter stingar.events.*>
  @type geoip
  geoip_lookup_keys src_ip
  geoip2_database /fluentd/etc/GeoLite2-ASN.mmdb
  backend_library geoip2_c
  <record>
    geo_asn     ${autonomous_system_number["src_ip"]}
    geo_asn_org ${autonomous_system_organization["src_ip"]}
  </record>
  skip_adding_null_record true
</filter>

<filter stingar.events.*>
  @type record_transformer
  enable_ruby true
  <record>
    hp_data ${(record["hp_data"] || {}).merge("geo_city" => record["geo_city"], "geo_cc" => record["geo_cc"], "geopoint" => record["geo_Loc"], "geo_asn" => record["geo_asn"], "geo_asn_org" => record["geo_asn_org"])}
  </record>
  remove_keys geo_city,geo_cc,geo_Loc,geo_asn,geo_asn_org
</filter>

<match stingar.events.*>
  @type copy

  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    verify_es_version_at_startup false
    default_elasticsearch_version 8
    logstash_format true
    logstash_prefix stingar
    logstash_dateformat %Y-%m-%d
    include_tag_key true
    tag_key fluentd_tag
    flush_interval 1s
    type_name fluentd
  </store>

  @include "#{(ENV['CIF_ENABLED'] || '').strip.downcase == 'true' ? '/fluentd/etc/out_conf/cif.conf' : '/dummy_cif'}"

  @include "#{(ENV['FILE_ENABLED'] || '').strip.downcase == 'true' ? '/fluentd/etc/out_conf/file.conf' : '/dummy_file'}"

  @include "#{(ENV['SYSLOG_ENABLED'] || '').strip.downcase == 'true' ? '/fluentd/etc/out_conf/syslog.conf' : '/dummy_syslog'}"

</match>

# --- New sensors only: stingar.enrichable.* -> c2-engine (writes ES directly) -

<filter stingar.enrichable.*>
  @type geoip
  geoip_lookup_keys src_ip
  <record>
    geo_cc      ${country.iso_code["src_ip"]}
    geo_city    ${city.names.en["src_ip"]}
    geo_Loc  '{ "lat": ${location.latitude["src_ip"]}, "lon": ${location.longitude["src_ip"]} }'
  </record>
  skip_adding_null_record true
</filter>

<filter stingar.enrichable.*>
  @type geoip
  geoip_lookup_keys src_ip
  geoip2_database /fluentd/etc/GeoLite2-ASN.mmdb
  backend_library geoip2_c
  <record>
    geo_asn     ${autonomous_system_number["src_ip"]}
    geo_asn_org ${autonomous_system_organization["src_ip"]}
  </record>
  skip_adding_null_record true
</filter>

<filter stingar.enrichable.*>
  @type record_transformer
  enable_ruby true
  <record>
    hp_data ${(record["hp_data"] || {}).merge("geo_city" => record["geo_city"], "geo_cc" => record["geo_cc"], "geopoint" => record["geo_Loc"], "geo_asn" => record["geo_asn"], "geo_asn_org" => record["geo_asn_org"])}
  </record>
  remove_keys geo_city,geo_cc,geo_Loc,geo_asn,geo_asn_org
</filter>

<match stingar.enrichable.*>
  @type copy

  # 1) Forward to c2-engine, which enriches and writes ES directly.
  #    require_ack_response: c2-engine acks a chunk only AFTER its ES writes
  #    succeed, so an engine-up/ES-down window can't silently drop events —
  #    no ack => Fluentd resends from this buffer (at-least-once).
  <store>
    @type forward
    require_ack_response true
    ack_response_timeout 60
    <server>
      host c2engine
      port 24230
    </server>
    <buffer>
      @type file
      path /fluentd/buffer/c2engine
      flush_interval 5s
      retry_max_interval 5m
      retry_forever true
    </buffer>
  </store>

  # 2) Preserve the stock side-outputs (CIF / file / syslog) for enrichable
  #    sensors too — otherwise upgrading a sensor silently drops it out of
  #    threat-sharing and log exports. Same conditional includes the
  #    stingar.events.* path uses.
  @include "#{(ENV['CIF_ENABLED'] || '').strip.downcase == 'true' ? '/fluentd/etc/out_conf/cif.conf' : '/dummy_cif'}"

  @include "#{(ENV['FILE_ENABLED'] || '').strip.downcase == 'true' ? '/fluentd/etc/out_conf/file.conf' : '/dummy_file'}"

  @include "#{(ENV['SYSLOG_ENABLED'] || '').strip.downcase == 'true' ? '/fluentd/etc/out_conf/syslog.conf' : '/dummy_syslog'}"
</match>

# --- Other stock tags unchanged -------------------------------------------------

<match stingar.sensors>
  @type copy

  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    verify_es_version_at_startup false
    default_elasticsearch_version 8
    index_name sensors
    flush_interval 1s
    id_key uuid
    remove_keys_on_update created
    write_operation upsert
    type_name fluentd
  </store>

  <store>
    @type stdout
  </store>
</match>

<match stingar.ansible>
  @type copy

  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    verify_es_version_at_startup false
    default_elasticsearch_version 8
    logstash_format true
    logstash_prefix ansible
    logstash_dateformat %Y-%m-%d
    include_tag_key true
    tag_key fluentd_tag
    type_name fluentd
    flush_interval 1s
    @log_level warn
  </store>

  <store>
    @type stdout
  </store>
</match>

<match stingar.rawlogs.*>
  @type copy

  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    verify_es_version_at_startup false
    default_elasticsearch_version 8
    logstash_format true
    logstash_prefix rawlogs
    logstash_dateformat %Y-%m-%d
    include_tag_key true
    flush_interval 1s
    type_name fluentd
    @log_level warn
  </store>
</match>
