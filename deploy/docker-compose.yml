# STINGAR platform stack + c2-engine (v2.3 images).
# Run from this directory:
#   cp env.txt stingar.env   # edit secrets/hostnames first
#   docker compose up -d
services:
  docs:
    image: 4warned/stingar-user-docs:v2.3

  elasticsearch:
    user: "1000"
    image: 4warned/elasticsearch:v2.3
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s
    volumes:
      - elastic_data:/usr/share/elasticsearch/data:z
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    environment:
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xmx1G -Xms1G"

  kibana:
    user: "1000"
    image: 4warned/kibana:v2.3
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  redis:
    image: redis:7-alpine

  fluentd:
    image: 4warned/fluentd:v2.3
    ports:
      - "24224:24224"
      - "24224:24224/udp"
      - "127.0.0.1:24225:24225"
      - "127.0.0.1:24225:24225/udp"
    env_file:
      - stingar.env
    volumes:
      - ./fluent.conf:/fluentd/etc/fluent.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      c2engine:
        condition: service_started

  c2engine:
    build:
      context: ..
      dockerfile: Dockerfile
    image: c2-engine:latest
    restart: on-failure
    environment:
      C2E_LISTEN_HOST: 0.0.0.0
      C2E_LISTEN_PORT: "24230"
      C2E_ES_HOST: elasticsearch
      C2E_ES_PORT: "9200"
    depends_on:
      elasticsearch:
        condition: service_healthy

  stingarapi:
    image: 4warned/stingar-api:v2.3
    env_file:
      - stingar.env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2', timeout=5)"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s
    volumes:
      - ./storage/db:/srv/db:z
      - honeypot_templates:/opt/templates
      - ./docker-compose.yml:/app/docker-compose.yml:rw
      - ./stingar.env:/app/stingar.env:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  stingarui:
    image: 4warned/stingar-ui:v2.3
    env_file:
      - stingar.env
    environment:
      - STINGAR_ENV_PATH=/app/stingar.env
    depends_on:
      stingarapi:
        condition: service_healthy
    volumes:
      - bundle:/bundle
      - node_module_cache:/stingar-ui/node_modules
      - ./stingar.env:/app/stingar.env:ro

  web:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/conf.d:z
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - credentials:/credentials
    depends_on:
      - stingarui
      - kibana
      - docs
    restart: on-failure

  langstroth:
    image: 4warned/langstroth:v2.3
    env_file:
      - stingar.env
    depends_on:
      stingarapi:
        condition: service_healthy

volumes:
  bundle:
  node_module_cache:
  credentials:
  elastic_data:
  honeypot_templates:
