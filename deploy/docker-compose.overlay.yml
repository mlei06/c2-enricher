# Legacy overlay — adds c2-engine to an EXISTING stock STINGAR compose.
# Mount deploy/fluent.conf (or merge deploy/fluentd/c2-engine.conf) so only
# stingar.enrichable.* is forwarded; stock stingar.events.* stays on ES.
#
# Run from the STINGAR root:
#   docker compose -f docker-compose.yml -f <this-repo>/deploy/docker-compose.overlay.yml up -d
services:
  c2engine:
    # Published image (linux/amd64). To build locally instead, uncomment build:
    # build: { context: .., dockerfile: Dockerfile }
    image: michaeldockerlei/c2-engine:v2.3
    restart: on-failure
    environment:
      C2E_LISTEN_HOST: 0.0.0.0
      C2E_LISTEN_PORT: "24230"
      C2E_ES_HOST: elasticsearch
      C2E_ES_PORT: "9200"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # M2 reason layer (rollup + intel overlay -> c2-entities, every 5 min).
  c2reason:
    image: michaeldockerlei/c2-engine:v2.3
    restart: on-failure
    command: ["reason", "--interval", "300"]
    environment:
      C2E_ES_HOST: elasticsearch
      C2E_ES_PORT: "9200"
      # M3 VirusTotal — off unless VT_API_KEY is set (cached in c2-vt).
      VT_API_KEY: "${VT_API_KEY:-}"
      C2E_VT_MAX_PER_RUN: "${C2E_VT_MAX_PER_RUN:-4}"
      C2E_VT_MIN_MALICIOUS: "${C2E_VT_MIN_MALICIOUS:-1}"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # M4 blocklist/alert feed (read-only HTTP over c2-entities).
  c2feed:
    image: michaeldockerlei/c2-engine:v2.3
    restart: on-failure
    command: ["feed"]
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      C2E_FEED_HOST: 0.0.0.0
      C2E_FEED_PORT: "8088"
      C2E_ES_HOST: elasticsearch
      C2E_ES_PORT: "9200"
    depends_on:
      elasticsearch:
        condition: service_healthy
