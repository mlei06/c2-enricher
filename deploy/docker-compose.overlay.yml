# Legacy overlay — adds c2-engine to an EXISTING stock STINGAR compose.
# Mount deploy/fluent.conf (or merge deploy/fluentd/c2-engine.conf) so only
# stingar.enrichable.* is forwarded; stock stingar.events.* stays on ES.
#
# Run from the STINGAR root:
#   docker compose -f docker-compose.yml -f <this-repo>/deploy/docker-compose.overlay.yml up -d
services:
  c2engine:
    build:
      context: ..
      dockerfile: Dockerfile
    image: c2-engine:latest
    restart: on-failure
    environment:
      C2E_LISTEN_HOST: 0.0.0.0
      C2E_LISTEN_PORT: "24230"
      C2E_ES_HOST: elasticsearch
      C2E_ES_PORT: "9200"
    depends_on:
      elasticsearch:
        condition: service_healthy
